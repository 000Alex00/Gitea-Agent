  <text x="716" y="314" font-size="11" fill="#dc3545">timeout</text>

  <line x1="460" y1="322" x2="880" y2="322" stroke="#eee" stroke-width="1"/>
  <text x="476" y="340" font-size="11" fill="#333">Fakten speichern</text>
  <rect x="610" y="329" width="60" height="16" rx="3" fill="#e9ecef"/>
  <text x="640" y="341" font-size="10" fill="#555" text-anchor="middle">routing</text>
  <text x="716" y="340" font-size="11" fill="#dc3545">keyword miss</text>

  <!-- Tag Aggregation Card -->
  <rect x="20" y="436" width="420" height="160" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="36" y="462" font-size="15" font-weight="600" fill="#222">Tag-Aggregation (7 Tage)</text>
  <rect x="20" y="470" width="420" height="26" rx="0" fill="#f8f9fa"/>
  <text x="36"  y="488" font-size="11" font-weight="600" fill="#555">Tag</text>
  <text x="260" y="488" font-size="11" font-weight="600" fill="#555">Fehlschläge</text>

  <line x1="20" y1="496" x2="440" y2="496" stroke="#eee" stroke-width="1"/>
  <rect x="36" y="500" width="90" height="16" rx="3" fill="#fff3cd"/>
  <text x="81"  y="512" font-size="10" fill="#856404" text-anchor="middle">vector_search</text>
  <text x="260" y="514" font-size="11" fill="#dc3545">3 / 5 Läufen</text>

  <line x1="20" y1="518" x2="440" y2="518" stroke="#eee" stroke-width="1"/>
  <rect x="36" y="522" width="52" height="16" rx="3" fill="#e9ecef"/>
  <text x="62"  y="534" font-size="10" fill="#555" text-anchor="middle">routing</text>
  <text x="260" y="536" font-size="11" fill="#333">1 / 5 Läufen</text>

  <!-- Health Check Card -->
  <rect x="460" y="436" width="420" height="160" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="476" y="462" font-size="15" font-weight="600" fill="#222">Health-Check (--doctor)</text>
  <text x="476" y="490" font-size="12" fill="#28a745">✅  Gitea-Verbindung</text>
  <text x="476" y="512" font-size="12" fill="#28a745">✅  Projekt-Verzeichnis</text>
  <text x="476" y="534" font-size="12" fill="#28a745">✅  repo_skeleton.json</text>
  <text x="476" y="556" font-size="12" fill="#28a745">✅  agent_eval.json</text>
  <text x="476" y="578" font-size="12" fill="#28a745">✅  Labels</text>

  <!-- Footer -->
  <text x="450" y="612" font-size="10" fill="#999" text-anchor="middle">Letzte Aktualisierung: 23:31:00 25.03.2026 — Auto-Refresh alle 60s</text>

  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>
</svg>
