<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#f4f4f4"/>

  <!-- Header -->
  <rect x="20" y="16" width="860" height="48" fill="#f4f4f4"/>
  <text x="32" y="48" font-size="22" font-weight="700" fill="#222">Agent Live-Dashboard</text>
  <rect x="650" y="22" width="100" height="30" rx="4" fill="#28a745"/>
  <text x="700" y="42" font-size="12" font-weight="700" fill="white" text-anchor="middle">Server: OK</text>
  <rect x="762" y="22" width="108" height="30" rx="4" fill="#28a745"/>
  <text x="816" y="42" font-size="12" font-weight="700" fill="white" text-anchor="middle">Worker: OK</text>

  <!-- Score Chart Card -->
  <rect x="20" y="72" width="860" height="150" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="36" y="98" font-size="15" font-weight="600" fill="#222">Score-Verlauf (Letzte 24h)</text>
  <!-- Chart axes -->
  <line x1="56" y1="200" x2="856" y2="200" stroke="#ddd" stroke-width="1"/>
  <line x1="56" y1="110" x2="56" y2="200" stroke="#ddd" stroke-width="1"/>
  <!-- Y labels -->
  <text x="44" y="115" font-size="10" fill="#999" text-anchor="end">7/7</text>
  <text x="44" y="148" font-size="10" fill="#999" text-anchor="end">5/7</text>
  <text x="44" y="182" font-size="10" fill="#999" text-anchor="end">3/7</text>
  <!-- Score line -->
  <polyline points="80,175 170,145 260,130 350,115 440,118 530,115 620,115 710,115 800,115"
            fill="none" stroke="#4e79a7" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="80"  cy="175" r="4" fill="#4e79a7"/>
  <circle cx="170" cy="145" r="4" fill="#4e79a7"/>
  <circle cx="260" cy="130" r="4" fill="#4e79a7"/>
  <circle cx="350" cy="115" r="4" fill="#4e79a7"/>
  <circle cx="440" cy="118" r="4" fill="#4e79a7"/>
  <circle cx="530" cy="115" r="4" fill="#4e79a7"/>
  <circle cx="620" cy="115" r="4" fill="#4e79a7"/>
  <circle cx="710" cy="115" r="4" fill="#4e79a7"/>
  <circle cx="800" cy="115" r="4" fill="#4e79a7"/>
  <!-- X labels -->
  <text x="80"  y="214" font-size="9" fill="#999" text-anchor="middle">00:00</text>
  <text x="260" y="214" font-size="9" fill="#999" text-anchor="middle">06:00</text>
  <text x="440" y="214" font-size="9" fill="#999" text-anchor="middle">12:00</text>
  <text x="620" y="214" font-size="9" fill="#999" text-anchor="middle">18:00</text>
  <text x="800" y="214" font-size="9" fill="#999" text-anchor="middle">23:00</text>

  <!-- Recent Evals Card -->
  <rect x="20" y="234" width="420" height="190" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="36" y="260" font-size="15" font-weight="600" fill="#222">Letzte Evaluierungen</text>
  <!-- Table header -->
  <rect x="20" y="268" width="420" height="28" rx="0" fill="#f8f9fa"/>
  <text x="36"  y="287" font-size="11" font-weight="600" fill="#555">Zeitpunkt</text>
  <text x="155" y="287" font-size="11" font-weight="600" fill="#555">Trigger</text>
  <text x="255" y="287" font-size="11" font-weight="600" fill="#555">Score</text>
  <text x="340" y="287" font-size="11" font-weight="600" fill="#555">Ergebnis</text>
  <!-- Rows -->
  <line x1="20" y1="296" x2="440" y2="296" stroke="#eee" stroke-width="1"/>
  <text x="36"  y="314" font-size="11" fill="#333">23:20</text>
  <text x="155" y="314" font-size="11" fill="#333">watch</text>
  <text x="255" y="314" font-size="11" fill="#333">7 / 7</text>
  <rect x="338" y="303" width="52" height="18" rx="3" fill="#28a745"/>
  <text x="364" y="316" font-size="10" fill="white" text-anchor="middle">✓ Pass</text>

  <line x1="20" y1="322" x2="440" y2="322" stroke="#eee" stroke-width="1"/>
  <text x="36"  y="340" font-size="11" fill="#333">22:20</text>
  <text x="155" y="340" font-size="11" fill="#333">watch</text>
  <text x="255" y="340" font-size="11" fill="#333">7 / 7</text>
  <rect x="338" y="329" width="52" height="18" rx="3" fill="#28a745"/>
  <text x="364" y="342" font-size="10" fill="white" text-anchor="middle">✓ Pass</text>

  <line x1="20" y1="348" x2="440" y2="348" stroke="#eee" stroke-width="1"/>
  <text x="36"  y="366" font-size="11" fill="#333">21:05</text>
  <text x="155" y="366" font-size="11" fill="#333">restart</text>
  <text x="255" y="366" font-size="11" fill="#333">7 / 7</text>
  <rect x="338" y="355" width="52" height="18" rx="3" fill="#28a745"/>
  <text x="364" y="368" font-size="10" fill="white" text-anchor="middle">✓ Pass</text>

  <line x1="20" y1="374" x2="440" y2="374" stroke="#eee" stroke-width="1"/>
  <text x="36"  y="392" font-size="11" fill="#333">18:10</text>
  <text x="155" y="392" font-size="11" fill="#333">pr</text>
  <text x="255" y="392" font-size="11" fill="#333">6 / 7</text>
  <rect x="338" y="381" width="52" height="18" rx="3" fill="#dc3545"/>
  <text x="364" y="394" font-size="10" fill="white" text-anchor="middle">✗ Fail</text>

  <!-- Errors Card -->
  <rect x="460" y="234" width="420" height="190" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="476" y="260" font-size="15" font-weight="600" fill="#222">Letzte Fehler</text>
  <rect x="460" y="268" width="420" height="28" rx="0" fill="#f8f9fa"/>
  <text x="476" y="287" font-size="11" font-weight="600" fill="#555">Test</text>
  <text x="616" y="287" font-size="11" font-weight="600" fill="#555">Tag</text>
  <text x="716" y="287" font-size="11" font-weight="600" fill="#555">Grund</text>

  <line x1="460" y1="296" x2="880" y2="296" stroke="#eee" stroke-width="1"/>
